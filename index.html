<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>أذكار المسلم</title>
  <link rel="icon" href="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhvQvRCN-YVeGSselB2MPL-WULCMsGItS-VYN8X6RkxoevWPbm8yyMwpiAOhZ9ZJnplfqOAE4Eeyp17F1ClXIgv-IQ43FIihvswBYNkDl4aJgqZUwNNQOAzDQzWcIcXxQNLvEOwsYbD3LqYDVLfoMw6rYi9RWF0UEkZVMz9MxZldQsy7uXxjzX8GrHPMgo/s1024/105827.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter','Tajawal',sans-serif; background:linear-gradient(145deg,#f8fafc 0%,#eff3f8 100%); direction:rtl; min-height:100vh; padding-bottom:90px; transition:background 0.3s,color 0.2s; }
    body.dark { background:#0b1120; color:#fff; }
    body.dark .card { background:rgba(18,25,45,0.9); border:1px solid rgba(66,153,225,0.2); backdrop-filter:blur(2px); box-shadow:0 15px 35px rgba(0,0,0,0.3); }
    body.dark .main-header h1, body.dark .main-header p, body.dark .card p, body.dark .card h2, body.dark .tasbeeh-card h3, body.dark .zekr-text { color:#fff !important; }
    body.dark .tasbeeh-number, body.dark .count { color:#fff; background:#0f172f; }
    body.dark .progress-bg { background:#1e2a3e; }
    body.dark .global-progress { background:rgba(17,24,39,0.95); border-color:#1f2a48; color:#fff; }
    body.dark .btn-secondary { background:#1e293b; color:#fff; }
    .floating-toolbar { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); display:flex; gap:6px; padding:6px 10px; border-radius:60px; background:rgba(15,25,45,0.78); backdrop-filter:blur(24px); border:1px solid rgba(255,255,255,0.18); z-index:1000; overflow-x:auto; box-shadow:0 20px 35px -12px rgba(0,0,0,0.4); }
    .floating-toolbar::-webkit-scrollbar { display:none; }
    .tool-btn { background:transparent; border:none; padding:10px 18px; border-radius:48px; color:#f1f5f9; font-size:0.9rem; font-weight:590; display:flex; align-items:center; gap:10px; cursor:pointer; transition:0.25s; white-space:nowrap; flex-shrink:0; }
    .tool-btn i { font-size:1.2rem; }
    .tool-btn span { font-size:0.85rem; font-weight:550; }
    .tool-btn.active { background:linear-gradient(125deg,#2b6ef0,#1a4fcf); color:white; transform:scale(1.02); box-shadow:0 8px 20px rgba(37,99,235,0.35), inset 0 1px 0 rgba(255,255,255,0.2); }
    .tool-btn:not(.active):hover { background:rgba(255,255,255,0.12); transform:translateY(-2px); }
    .main-header { text-align:center; padding:30px 20px 20px; }
    .main-header h1 { font-size:1.9rem; font-weight:700; background:linear-gradient(135deg,#1e3c72,#2a5298); -webkit-background-clip:text; color:transparent; display:inline-flex; gap:12px; }
    .main-header p { color:#4a5568; margin-top:8px; font-size:0.9rem; font-weight:500; }
    .container { max-width:780px; margin:0 auto; padding:8px 20px 30px; }
    .card { background:rgba(255,255,255,0.96); border-radius:32px; padding:1.6rem 1.5rem; margin-bottom:24px; box-shadow:0 12px 30px rgba(0,0,0,0.05); border:1px solid rgba(255,255,255,0.6); }
    .zekr-text { font-size:1.15rem; line-height:1.65; font-weight:500; color:#0f172a; margin-bottom:20px; text-align:right; word-break:break-word; }
    .counter-section { display:flex; align-items:baseline; justify-content:space-between; flex-wrap:wrap; gap:12px; margin-bottom:18px; }
    .count { font-size:1rem; font-weight:700; background:#eef2ff; padding:6px 14px; border-radius:40px; color:#1e3a8a; font-family:monospace; }
    .btn-primary { background:linear-gradient(105deg,#2563eb,#1d4ed8); border:none; padding:12px 28px; border-radius:60px; font-size:0.95rem; font-weight:600; color:white; cursor:pointer; display:inline-flex; align-items:center; gap:10px; }
    .progress-wrapper { margin-top:18px; }
    .progress-bg { background:#e2e8f0; border-radius:40px; height:8px; overflow:hidden; width:100%; }
    .bar { height:8px; background:linear-gradient(90deg,#3b82f6,#60a5fa); width:0%; border-radius:40px; transition:width 0.25s; }
    .global-progress { background:rgba(255,255,255,0.95); border-radius:80px; padding:12px 20px; margin-bottom:28px; text-align:center; font-weight:700; font-size:1rem; display:flex; justify-content:center; gap:12px; box-shadow:0 10px 25px rgba(0,0,0,0.08); border:1px solid #eef2ff; position:sticky; top:15px; z-index:999; }
    .tasbeeh-card { text-align:center; background:white; border-radius:48px; padding:2rem; }
    .tasbeeh-number { font-size:5rem; font-weight:800; background:linear-gradient(145deg,#1e3c72,#2b4a8a); -webkit-background-clip:text; color:transparent; margin:20px 0; }
    .btn-group { display:flex; gap:20px; justify-content:center; margin-top:25px; flex-wrap:wrap; }
    .btn-secondary { background:#f1f5f9; border:none; padding:12px 28px; border-radius:50px; font-weight:600; color:#1e293b; cursor:pointer; display:inline-flex; align-items:center; gap:8px; }
  </style>
</head>
<body>
  <div class="main-header">
    <h1 id="mainTitle"><i class="fas fa-star-and-crescent"></i> أذكار المسلم</h1>
    <p id="mainSubtitle">أذكار | تسبيح | طمأنينة</p>
  </div>

  <div class="container" id="app"></div>

  <div class="floating-toolbar" id="floatingBar">
    <button class="tool-btn" id="btnHome"><i class="fas fa-home"></i> <span>الرئيسية</span></button>
    <button class="tool-btn" id="btnMorning"><i class="fas fa-sun"></i> <span>الصباح</span></button>
    <button class="tool-btn" id="btnEvening"><i class="fas fa-moon"></i> <span>المساء</span></button>
    <button class="tool-btn" id="btnPrayer"><i class="fas fa-mosque"></i> <span>الصلوات</span></button>
    <button class="tool-btn" id="btnQuran"><i class="fas fa-book-open"></i> <span>قرآن</span></button>
    <button class="tool-btn" id="btnTasbeeh"><i class="fas fa-praying-hands"></i> <span>المسبحة</span></button>
    <button class="tool-btn" id="btnDark"><i class="fas fa-moon"></i> <span>ليلي</span></button>
  </div>

  <script>
    // ----------------------------- DATA -------------------------
    const morning = [
      { zekr:"اللَّهُ لَا إِلَٰهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ", max:1 },
      { zekr:"قُلْ هُوَ اللَّهُ أَحَدٌ ۝ اللَّهُ الصَّمَدُ", max:3 },
      { zekr:"أَصْبَحْنَا وَأَصْبَحَ الْمُلْكُ لِلَّهِ، وَالْحَمْدُ لِلَّهِ", max:1 },
      { zekr:"سُبْحَانَ اللَّهِ وَبِحَمْدِهِ عدد خلقه، ورضا نفسه، وزنة عرشه، ومداد كلماته", max:3 }
    ];
    const evening = [
      { zekr:"اللَّهُ لَا إِلَٰهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ", max:1 },
      { zekr:"قُلْ هُوَ اللَّهُ أَحَدٌ ۝ اللَّهُ الصَّمَدُ", max:3 },
      { zekr:"أَمْسَيْنَا وَأَمْسَى الْمُلْكُ لِلَّهِ، وَالْحَمْدُ لِلَّهِ", max:1 },
      { zekr:"أعوذ بكلمات الله التامات من شر ما خلق", max:3 }
    ];
    const prayer = [
      { zekr:"سُبْحَانَ اللَّهِ", max:33 },
      { zekr:"الْحَمْدُ لِلَّهِ", max:33 },
      { zekr:"اللَّهُ أَكْبَرُ", max:33 },
      { zekr:"لَا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ، وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ", max:1 }
    ];
    const quran = [
      { zekr:"سُبْحَانَ اللَّهِ", max:33 },
      { zekr:"رَبَّنَا آتِنَا فِي الدُّنْيَا حَسَنَةً وَفِي الْآخِرَةِ حَسَنَةً وَقِنَا عَذَابَ النَّارِ", max:1 },
      { zekr:"رَبَّنَا لَا تُزِغْ قُلُوبَنَا بَعْدَ إِذْ هَدَيْتَنَا وَهَبْ لَنَا مِن لَّدُنكَ رَحْمَةً ۚ إِنَّكَ أَنتَ الْوَهَّابُ", max:1 }
    ];

    let morningCounts = new Array(morning.length).fill(0);
    let eveningCounts = new Array(evening.length).fill(0);
    let prayerCounts = new Array(prayer.length).fill(0);
    let quranCounts = new Array(quran.length).fill(0);
    let tasbeehValue = 0;

    function saveCounts() {
      sessionStorage.setItem('morningCounts', JSON.stringify(morningCounts));
      sessionStorage.setItem('eveningCounts', JSON.stringify(eveningCounts));
      sessionStorage.setItem('prayerCounts', JSON.stringify(prayerCounts));
      sessionStorage.setItem('quranCounts', JSON.stringify(quranCounts));
      sessionStorage.setItem('tasbeehValue', tasbeehValue);
    }

    function loadCounts() {
      const savedM = sessionStorage.getItem('morningCounts');
      const savedE = sessionStorage.getItem('eveningCounts');
      const savedP = sessionStorage.getItem('prayerCounts');
      const savedQ = sessionStorage.getItem('quranCounts');
      const savedT = sessionStorage.getItem('tasbeehValue');
      if(savedM) morningCounts = JSON.parse(savedM);
      if(savedE) eveningCounts = JSON.parse(savedE);
      if(savedP) prayerCounts = JSON.parse(savedP);
      if(savedQ) quranCounts = JSON.parse(savedQ);
      if(savedT) tasbeehValue = parseInt(savedT)||0;
    }

    function updateHeader(title, subtitle, iconClass){
      document.getElementById('mainTitle').innerHTML = `<i class="fas ${iconClass}"></i> ${title}`;
      document.getElementById('mainSubtitle').innerText = subtitle;
    }

    function updateActiveToolbarButton(activeId){
      ['btnHome','btnMorning','btnEvening','btnPrayer','btnQuran','btnTasbeeh'].forEach(id=>{
        document.getElementById(id)?.classList.remove('active');
      });
      document.getElementById(activeId)?.classList.add('active');
    }

    function renderAzkar(type){
      let list, counts, activeBtnId, sectionTitle;
      if(type==='morning'){ list=morning; counts=morningCounts; activeBtnId='btnMorning'; sectionTitle='أذكار الصباح'; updateHeader('أذكار الصباح','حصن نفسك كل صباح','fa-sun'); }
      else if(type==='evening'){ list=evening; counts=eveningCounts; activeBtnId='btnEvening'; sectionTitle='أذكار المساء'; updateHeader('أذكار المساء','حصن نفسك كل مساء','fa-moon'); }
      else if(type==='prayer'){ list=prayer; counts=prayerCounts; activeBtnId='btnPrayer'; sectionTitle='أذكار الصلوات'; updateHeader('أذكار الصلوات','أذكار ما بعد الصلاة المكتوبة','fa-mosque'); }
      else if(type==='quran'){ list=quran; counts=quranCounts; activeBtnId='btnQuran'; sectionTitle='أدعية من القرآن'; updateHeader('أدعية من القرآن','من جوامع الدعاء','fa-book-open'); }

      let html='', doneCount=0;
      list.forEach((item,idx)=>{
        const current = counts[idx];
        const percent = (current/item.max)*100;
        if(current>=item.max) doneCount++;
        html+=`<div class="card" data-idx="${idx}">
          <div class="zekr-text">${item.zekr}</div>
          <div class="counter-section">
            <span class="count"><i class="fas fa-check-circle"></i> ${current} / ${item.max}</span>
            <button class="btn-primary" data-type="${type}" data-idx="${idx}"><i class="fas fa-pray"></i> ذكر</button>
          </div>
          <div class="progress-wrapper">
            <div class="progress-bg"><div class="bar" style="width:${percent}%;"></div></div>
          </div>
        </div>`;
      });
      const totalPercent = Math.round((doneCount/list.length)*100)||0;
      const headerHtml = `<div class="global-progress"><i class="fas fa-chart-simple"></i> إنجاز ${sectionTitle}: ${totalPercent}% (${doneCount}/${list.length})</div>`;
      document.getElementById('app').innerHTML = headerHtml+html;

      document.querySelectorAll('.btn-primary').forEach(btn=>{
        btn.addEventListener('click',()=>{
          const idx=parseInt(btn.dataset.idx);
          const t=btn.dataset.type;
          if(t==='morning'&&morningCounts[idx]<morning[idx].max) morningCounts[idx]++;
          else if(t==='evening'&&eveningCounts[idx]<evening[idx].max) eveningCounts[idx]++;
          else if(t==='prayer'&&prayerCounts[idx]<prayer[idx].max) prayerCounts[idx]++;
          else if(t==='quran'&&quranCounts[idx]<quran[idx].max) quranCounts[idx]++;
          renderAzkar(t); saveCounts();
        });
      });

      updateActiveToolbarButton(activeBtnId
