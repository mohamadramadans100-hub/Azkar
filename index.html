<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>أذكار المسلم</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    body { font-family: sans-serif; direction: rtl; background: #f8fafc; padding-bottom: 80px; transition: 0.3s; }
    body.dark { background: #0b1120; color: #fff; }
    .main-header { text-align: center; padding: 20px; }
    .container { max-width: 600px; margin: 0 auto; padding: 0 20px; }
    .card { background: #fff; border-radius: 20px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    body.dark .card { background: #1e293b; border: 1px solid #334155; }
    .zekr-text { font-size: 1.1rem; margin-bottom: 15px; line-height: 1.6; }
    .counter-section { display: flex; justify-content: space-between; align-items: center; }
    .count-display { font-weight: bold; background: #eef2ff; padding: 5px 15px; border-radius: 20px; color: #1e40af; }
    body.dark .count-display { background: #0f172a; color: #fff; }
    .btn-primary { background: #2563eb; color: #fff; border: none; padding: 10px 25px; border-radius: 30px; cursor: pointer; font-weight: bold; }
    .progress-bg { background: #e2e8f0; height: 8px; border-radius: 10px; margin-top: 15px; overflow: hidden; }
    .bar { background: #3b82f6; height: 100%; width: 0%; transition: width 0.3s; }
    .floating-toolbar { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); background: #1e293b; padding: 10px; border-radius: 40px; display: flex; gap: 10px; z-index: 1000; }
    .tool-btn { background: none; border: none; color: #fff; cursor: pointer; font-size: 0.9rem; display: flex; flex-direction: column; align-items: center; }
    .tool-btn i { font-size: 1.2rem; }
  </style>
</head>
<body>

<div class="main-header">
  <h1 id="mainTitle">أذكار المسلم</h1>
  <p id="sectionProgress"></p>
</div>

<div class="container" id="app"></div>

<div class="floating-toolbar">
  <button class="tool-btn" onclick="renderHome()"><i class="fas fa-home"></i><span>الرئيسية</span></button>
  <button class="tool-btn" onclick="renderAzkar('morning')"><i class="fas fa-sun"></i><span>الصباح</span></button>
  <button class="tool-btn" onclick="renderAzkar('evening')"><i class="fas fa-moon"></i><span>المساء</span></button>
  <button class="tool-btn" onclick="renderAzkar('prayer')"><i class="fas fa-mosque"></i><span>الصلوات</span></button>
  <button class="tool-btn" onclick="toggleDark()"><i class="fas fa-adjust"></i><span>ليلي</span></button>
</div>

<script>
  const data = {
    morning: [
      { z: "أصبحنا وأصبح الملك لله والحمد لله..", max: 1 },
      { z: "سبحان الله وبحمده (100 مرة)", max: 100 },
      { z: "اللهم بك أصبحنا وبك أمسينا..", max: 1 }
    ],
    evening: [
      { z: "أمسينا وأمسى الملك لله والحمد لله..", max: 1 },
      { z: "أعوذ بكلمات الله التامات من شر ما خلق", max: 3 }
    ],
    prayer: [
      { z: "أستغفر الله (3 مرات)", max: 3 },
      { z: "اللهم أنت السلام ومنك السلام..", max: 1 }
    ]
  };

  let counts = { morning: [0,0,0], evening: [0,0], prayer: [0,0] };
  let currentSection = '';

  function renderAzkar(section) {
    currentSection = section;
    const list = data[section];
    const sectionTitle = section === 'morning' ? 'أذكار الصباح' : section === 'evening' ? 'أذكار المساء' : 'أذكار الصلوات';
    document.getElementById('mainTitle').innerText = sectionTitle;
    
    let html = '';
    list.forEach((item, idx) => {
      const c = counts[section][idx];
      const p = (c / item.max) * 100;
      html += `
        <div class="card" id="card-${idx}">
          <div class="zekr-text">${item.z}</div>
          <div class="counter-section">
            <span class="count-display" id="count-${idx}">${c} / ${item.max}</span>
            <button class="btn-primary" onclick="doZekr(${idx})">ذكر</button>
          </div>
          <div class="progress-bg"><div class="bar" id="bar-${idx}" style="width: ${p}%"></div></div>
        </div>
      `;
    });
    document.getElementById('app').innerHTML = html;
    updateGlobalProgress();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // الوظيفة الأساسية: التحديث في المكان بدون Scroll
  window.doZekr = function(idx) {
    const section = currentSection;
    const item = data[section][idx];
    
    if (counts[section][idx] < item.max) {
      counts[section][idx]++;
      
      // تحديث العناصر في الـ HTML مباشرة بدون إعادة رسم الصفحة
      const countEl = document.getElementById(`count-${idx}`);
      const barEl = document.getElementById(`bar-${idx}`);
      
      if (countEl) countEl.innerText = `${counts[section][idx]} / ${item.max}`;
      if (barEl) barEl.style.width = `${(counts[section][idx] / item.max) * 100}%`;
      
      updateGlobalProgress();
    }
  };

  function updateGlobalProgress() {
    const section = currentSection;
    if (!data[section]) return;
    const done = counts[section].filter((c, i) => c >= data[section][i].max).length;
    document.getElementById('sectionProgress').innerText = `تم إنجاز ${done} من ${data[section].length}`;
  }

  function renderHome() {
    document.getElementById('mainTitle').innerText = "أذكار المسلم";
    document.getElementById('sectionProgress').innerText = "";
    document.getElementById('app').innerHTML = `
      <div class="card" style="text-align:center">
        <h3>اختر قسم الأذكار</h3>
        <button class="btn-primary" style="margin:5px" onclick="renderAzkar('morning')">الصباح</button>
        <button class="btn-primary" style="margin:5px" onclick="renderAzkar('evening')">المساء</button>
        <button class="btn-primary" style="margin:5px" onclick="renderAzkar('prayer')">الصلوات</button>
      </div>
    `;
  }

  function toggleDark() { document.body.classList.toggle('dark'); }

  renderHome();
</script>

</body>
</html>
