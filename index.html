<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>أذكار الصباح والمساء</title>
<style>
body{font-family:Tajawal, Arial;direction:rtl;margin:0;background:#f3f5f9;text-align:center;transition:0.3s;}
header{background:#2f74da;color:white;padding:20px;font-size:22px;}
.container{max-width:700px;margin:auto;padding:20px;}
.main-btn{width:260px;padding:18px;margin:10px;font-size:20px;border:none;border-radius:14px;background:#2f74da;color:white;cursor:pointer;transition:0.2s;}
.main-btn:active{transform:scale(0.95);}
.card{background:white;padding:20px;margin:15px 0;border-radius:15px;box-shadow:0 5px 15px rgba(0,0,0,0.1);}
button{background:#2f74da;color:white;border:none;padding:10px 20px;font-size:18px;border-radius:10px;cursor:pointer;}
.count{font-size:24px;margin:10px;}
.progress{background:#ddd;height:10px;border-radius:10px;}
.bar{height:10px;background:#2f74da;width:0%;border-radius:10px;}
.dark{background:#121212;color:white;}
.dark header{background:#1f1f1f;}
.dark .card{background:#1e1e1e;}
.top-buttons{margin-top:10px;}
</style>
</head>
<body>
<header>
📿 أذكار الصباح والمساء
<div class="top-buttons">
<button onclick="home()">الرئيسية</button>
<button onclick="toggleDark()">🌙 الوضع الليلي</button>
</div>
</header>

<script>
// أذكار الصباح والمساء مع الإضافات الجديدة

{zekr:"قُلْ أَعُوذُ بِرَبِّ الْفَلَقِ ۝ مِنْ شَرِّ مَا خَلَقَ ۝ وَمِنْ شَرِّ غَاسِقٍ إِذَا وَقَبَ ۝ وَمِنْ شَرِّ النَّفَّاثَاتِ فِي الْعُقَدِ ۝ وَمِنْ شَرِّ حَاسِدٍ إِذَا حَسَدَ",max:3},
{zekr:"قُلْ أَعُوذُ بِرَبِّ النَّاسِ ۝ مَلِكِ النَّاسِ ۝ إِلَٰهِ النَّاسِ ۝ مِنْ شَرِّ الْوَسْوَاسِ الْخَنَّاسِ ۝ الَّذِي يُوَسْوِسُ فِي صُدُورِ النَّاسِ ۝ مِنَ الْجِنَّةِ وَالنَّاسِ",max:3}

{zekr:"اللهم ما أصبح بي من نعمة، أو بأحد من خلقك فمنك وحدك لا شريك لك، فلك الحمد ولك الشكر",max:1},
{zekr:"رضيت بالله ربًا، وبالإسلام دينًا، وبمحمد ﷺ نبيًا ورسولًا",max:3},
{zekr:"اللهم إني أسألك علمًا نافعًا، ورزقًا طيبًا، وعملًا متقبلًا",max:1},
{zekr:"يا حي يا قيوم برحمتك استغيث اصلح لي شأني كله ولا تكلني إلى نفسي طرفة عين",max:1},
{zekr:"اللهم أنت ربي، لا إله إلا أنت، خلقتني وانا عبدك، وأنا على عهدك ووعدك ما استطعت، أعوذ بك من شر ما صنعت، أبوء لك بذنبي فاغفر لي فإنه لا يغفر الذنوب إلا أنت",max:1},

{zekr:"اللهم إني أسألك العفو والعافية في لدنيا والآخرة، اللهم إني أسألك العفو والعافية في ديني ودنياي وأهلي ومالي، اللهم أستر عوراتي وآمن روعات، اللهم أحفظني من بين يدي ومن خلفي وعن يميني وعن شمالي ومن فوقي، وأعوذ بعظمتك أن أغتال من تحتي",max:1},
{zekr:"اللهم عافني في بدني، اللهم عافني في سمعي، اللهم عافني في بصري، لا إله إلا أنت، اللهم إني أعوذ بك من الكُفر والفقر، وأعوذ بك من عذاب القبر، لا إله إلا أنت، اللهم إني أعوذ بك من الهم والحزن والعجز والكسل وأعوذ بك من الجبن والبخل وغلبة الدين وقهر الرجال",max:3},
{zekr:"بسم الله الذي لا يضر مع اسمه شيء في الأرض ولا في السماء وهو السميع العليم",max:3},
{zekr:"سبحان الله وبحمده عدد خلقه، ورضا نفسه، وزنة عرشه، ومداد كلماته",max:3},
{zekr:"حسبي الله لا إله إلا هو عليه توكلت وهو رب العرش العظيم",max:7},
{zekr:"اللهم صلي على محمد وعلى آل محمد كما صليت على إبراهيم وعلى آل إبراهيم، وبارك على محمد وعلى آل محمد كما باركت على إبراهيم وعلى آل إبراهيم إنك حميد مجيد",max:10},

// باقي الكود كما هو من آخر نسخة
function home(){
  document.getElementById("app").innerHTML=`
<h2>اختر الأذكار</h2>
<button class="main-btn" onclick="showAzkar('morning')">🌞 أذكار الصباح</button>
<button class="main-btn" onclick="showAzkar('evening')">🌙 أذكار المساء</button>
<button class="main-btn" onclick="tasbeeh()">📿 المسبحة الإلكترونية</button>
  `;
}

function showAzkar(type){
  let list=type==="morning"?morning:evening;
  let html="";
  let done=0;

  list.forEach((item,i)=>{
    let saved=0; // يبدأ من صفر دائمًا
    if(saved>=item.max) done++;
    let percent=(saved/item.max)*100;

    html+=`
<div class="card">
<p>${item.zekr}</p>
<div class="count">${saved} / ${item.max}</div>
<button onclick="inc(${i},${item.max},'${type}')">ذكر</button>
<div class="progress">
<div class="bar" style="width:${percent}%"></div>
</div>
</div>
    `;
  });

  let percentDone=Math.round(done/list.length*100);
  html="<h3>نسبة إنجاز الأذكار "+percentDone+"%</h3>"+html;
  document.getElementById("app").innerHTML=html;
}

function inc(index,max,type){
  const countEls=document.querySelectorAll(".count");
  let val=parseInt(countEls[index].innerText);
  if(val<max) val++;
  countEls[index].innerText=val+" / "+max;
  document.querySelectorAll(".bar")[index].style.width=(val/max*100)+"%";

  // إعادة حساب نسبة الإنجاز
  const cards=document.querySelectorAll(".card");
  let done=0;
  cards.forEach(card=>{
    let val=parseInt(card.querySelector(".count").innerText.split(" / ")[0]);
    let maxVal=parseInt(card.querySelector(".count").innerText.split(" / ")[1]);
    if(val>=maxVal) done++;
  });
  document.querySelector("h3").innerText="نسبة إنجاز الأذكار "+Math.round(done/cards.length*100)+"%";
}

// المسبحة الإلكترونية
function tasbeeh(){
  let count=0; // يبدأ من صفر دائمًا
  document.getElementById("app").innerHTML=`
<h2>📿 المسبحة</h2>
<h1 id="tas">${count}</h1>
<button onclick="incTas()">تسبيح</button>
<button onclick="resetTas()">تصفير</button>
  `;
}

function incTas(){
  let c=document.getElementById("tas");
  let val=parseInt(c.innerText);
  val++;
  c.innerText=val;
}

function resetTas(){
  document.getElementById("tas").innerText=0;
}

// الوضع الليلي
function toggleDark(){
  document.body.classList.toggle("dark");
}

home();
</script>
