<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>أذكار المسلم</title>
  <link rel="icon" href="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhvQvRCN-YVeGSselB2MPL-WULCMsGItS-VYN8X6RkxoevWPbm8yyMwpiAOhZ9ZJnplfqOAE4Eeyp17F1ClXIgv-IQ43FIihvswBYNkDl4aJgqZUwNNQOAzDQzWcIcXxQNLvEOwsYbD3LqYDVLfoMw6rYi9RWF0UEkZVMz9MxZldQsy7uXxjzX8GrHPMgo/s1024/105827.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', 'Tajawal', sans-serif;
      background: linear-gradient(145deg, #f8fafc 0%, #eff3f8 100%);
      direction: rtl;
      transition: background 0.3s ease, color 0.2s ease;
      min-height: 100vh;
      padding-bottom: 90px;
    }

    /* ---------------- Dark Mode ---------------- */
    body.dark {
      background: #0b1120;
      color: #ffffff;
    }

    body.dark .card {
      background: rgba(18, 25, 45, 0.9);
      backdrop-filter: blur(2px);
      border: 1px solid rgba(66, 153, 225, 0.2);
    }

    body.dark .main-header h1,
    body.dark .main-header p,
    body.dark .card p,
    body.dark .card h2,
    body.dark .tasbeeh-card h3,
    body.dark .zekr-text {
      color: #ffffff !important;
    }

    body.dark .count {
      background: #0f172f;
      color: #ffffff;
    }

    body.dark .progress-bg {
      background: #1e2a3e;
    }

    body.dark .global-progress {
      background: rgba(17, 24, 39, 0.95);
      border-color: #1f2a48;
      color: #ffffff;
    }

    /* ---------------- Toolbar ---------------- */
    .floating-toolbar {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(15, 25, 45, 0.78);
      backdrop-filter: blur(24px);
      border-radius: 60px;
      padding: 6px 10px;
      display: flex;
      align-items: center;
      gap: 6px;
      z-index: 1000;
      border: 1px solid rgba(255, 255, 255, 0.18);
      overflow-x: auto;
      scrollbar-width: none;
    }

    .tool-btn {
      background: transparent;
      border: none;
      padding: 10px 18px;
      border-radius: 48px;
      color: #f1f5f9;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      white-space: nowrap;
    }

    .tool-btn.active {
      background: linear-gradient(125deg, #2b6ef0, #1a4fcf);
      color: white;
    }

    /* ---------------- Headers & Cards ---------------- */
    .main-header {
      text-align: center;
      padding: 30px 20px 20px;
    }

    .main-header h1 {
      font-size: 1.9rem;
      font-weight: 700;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    .container {
      max-width: 780px;
      margin: 0 auto;
      padding: 8px 20px 30px;
    }

    .card {
      background: white;
      border-radius: 32px;
      padding: 1.6rem 1.5rem;
      margin-bottom: 24px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    }

    .zekr-text {
      font-size: 1.15rem;
      line-height: 1.65;
      font-weight: 500;
      margin-bottom: 20px;
    }

    .counter-section {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .count {
      font-size: 1rem;
      font-weight: 700;
      background: #eef2ff;
      padding: 6px 14px;
      border-radius: 40px;
    }

    .btn-primary {
      background: linear-gradient(105deg, #2563eb, #1d4ed8);
      border: none;
      padding: 12px 28px;
      border-radius: 60px;
      color: white;
      cursor: pointer;
      font-weight: 600;
    }

    .progress-bg {
      background: #e2e8f0;
      border-radius: 40px;
      height: 8px;
      margin-top: 15px;
    }

    .bar {
      height: 100%;
      background: linear-gradient(90deg, #3b82f6, #60a5fa);
      transition: width 0.3s ease;
      border-radius: 40px;
    }

    .global-progress {
      background: white;
      border-radius: 80px;
      padding: 12px 20px;
      margin-bottom: 20px;
      text-align: center;
      position: sticky;
      top: 15px;
      z-index: 999;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    }
  </style>
</head>
<body>

  <div class="main-header">
    <h1 id="mainTitle"><i class="fas fa-star-and-crescent"></i> أذكار المسلم</h1>
    <p id="mainSubtitle">أذكار | تسبيح | طمأنينة</p>
  </div>

  <div class="container" id="app"></div>

  <div class="floating-toolbar">
    <button class="tool-btn" id="btnHome"><i class="fas fa-home"></i> <span>الرئيسية</span></button>
    <button class="tool-btn" id="btnMorning"><i class="fas fa-sun"></i> <span>الصباح</span></button>
    <button class="tool-btn" id="btnEvening"><i class="fas fa-moon"></i> <span>المساء</span></button>
    <button class="tool-btn" id="btnPrayer"><i class="fas fa-mosque"></i> <span>الصلوات</span></button>
    <button class="tool-btn" id="btnQuran"><i class="fas fa-book-open"></i> <span>قرآن</span></button>
    <button class="tool-btn" id="btnTasbeeh"><i class="fas fa-praying-hands"></i> <span>المسبحة</span></button>
    <button class="tool-btn" id="btnDark"><i class="fas fa-moon"></i> <span>ليلي</span></button>
  </div>

  <script>
    // البيانات (نفس البيانات السابقة)
    const morning = [{ zekr: "اللَّهُ لَا إِلَٰهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ ۚ...", max: 1 }, { zekr: "قُلْ هُوَ اللَّهُ أَحَدٌ...", max: 3 }];
    const evening = [{ zekr: "أَمْسَيْنَا وَأَمْسَى الْمُلْكُ لِلَّهِ...", max: 1 }, { zekr: "أعوذ بكلمات الله التامات...", max: 3 }];
    const prayer = [{ zekr: "سُبْحَانَ اللَّهِ", max: 33 }, { zekr: "الْحَمْدُ لِلَّهِ", max: 33 }, { zekr: "اللَّهُ أَكْبَرُ", max: 33 }];
    const quran = [{ zekr: "رَبَّنَا آتِنَا فِي الدُّنْيَا حَسَنَةً...", max: 1 }];

    let morningCounts = new Array(morning.length).fill(0);
    let eveningCounts = new Array(evening.length).fill(0);
    let prayerCounts = new Array(prayer.length).fill(0);
    let quranCounts = new Array(quran.length).fill(0);
    let tasbeehValue = 0;

    function saveCounts() {
      sessionStorage.setItem('mC', JSON.stringify(morningCounts));
      sessionStorage.setItem('eC', JSON.stringify(eveningCounts));
      sessionStorage.setItem('pC', JSON.stringify(prayerCounts));
      sessionStorage.setItem('qC', JSON.stringify(quranCounts));
      sessionStorage.setItem('tV', tasbeehValue);
    }

    function renderAzkar(type, skipScroll = false) {
      let list, counts, sectionTitle, icon;
      if (type === 'morning') { list = morning; counts = morningCounts; sectionTitle = 'أذكار الصباح'; icon = 'fa-sun'; }
      else if (type === 'evening') { list = evening; counts = eveningCounts; sectionTitle = 'أذكار المساء'; icon = 'fa-moon'; }
      else if (type === 'prayer') { list = prayer; counts = prayerCounts; sectionTitle = 'أذكار الصلوات'; icon = 'fa-mosque'; }
      else if (type === 'quran') { list = quran; counts = quranCounts; sectionTitle = 'أدعية القرآن'; icon = 'fa-book-open'; }

      document.getElementById('mainTitle').innerHTML = `<i class="fas ${icon}"></i> ${sectionTitle}`;
      
      let html = '';
      let done = 0;
      list.forEach((item, idx) => {
        const current = counts[idx];
        if (current >= item.max) done++;
        html += `
          <div class="card">
            <div class="zekr-text">${item.zekr}</div>
            <div class="counter-section">
              <span class="count">${current} / ${item.max}</span>
              <button class="btn-primary" onclick="increment('${type}', ${idx})">ذكر</button>
            </div>
            <div class="progress-bg"><div class="bar" style="width: ${(current/item.max)*100}%;"></div></div>
          </div>
        `;
      });

      const totalPct = Math.round((done/list.length)*100);
      const header = `<div class="global-progress">إنجاز ${sectionTitle}: ${totalPct}%</div>`;
      document.getElementById('app').innerHTML = header + html;
      
      // التعديل: لا نقوم بعمل Scroll إذا كان التحديث ناتج عن ضغطة زر الذكر
      if (!skipScroll) window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    window.increment = function(type, idx) {
      if (type === 'morning' && morningCounts[idx] < morning[idx].max) morningCounts[idx]++;
      else if (type === 'evening' && eveningCounts[idx] < evening[idx].max) eveningCounts[idx]++;
      else if (type === 'prayer' && prayerCounts[idx] < prayer[idx].max) prayerCounts[idx]++;
      else if (type === 'quran' && quranCounts[idx] < quran[idx].max) quranCounts[idx]++;
      
      saveCounts();
      renderAzkar(type, true); // إرسال true لمنع الصعود لأعلى الصفحة
    };

    function renderHome() {
      document.getElementById('mainTitle').innerHTML = `<i class="fas fa-star-and-crescent"></i> أذكار المسلم`;
      document.getElementById('app').innerHTML = `
        <div class="card" style="text-align:center;">
          <h2>اختر قسم الأذكار</h2>
          <div style="display:flex; flex-wrap:wrap; gap:10px; margin-top:20px; justify-content:center;">
            <button class="btn-primary" onclick="renderAzkar('morning')">أذكار الصباح</button>
            <button class="btn-primary" onclick="renderAzkar('evening')">أذكار المساء</button>
            <button class="btn-primary" onclick="renderAzkar('prayer')">أذكار الصلوات</button>
            <button class="btn-primary" onclick="renderAzkar('quran')">أدعية القرآن</button>
            <button class="btn-primary" style="width:100%" onclick="renderTasbeeh()">المسبحة الإلكترونية</button>
          </div>
        </div>
      `;
    }

    function renderTasbeeh() {
      document.getElementById('mainTitle').innerHTML = `<i class="fas fa-praying-hands"></i> المسبحة`;
      document.getElementById('app').innerHTML = `
        <div class="card" style="text-align:center;">
          <div style="font-size:4rem; margin:20px 0;">${tasbeehValue}</div>
          <button class="btn-primary" style="padding:15px 40px" onclick="tasbeehValue++; renderTasbeeh(); saveCounts();">تسبيح</button>
          <button class="btn-secondary" onclick="tasbeehValue=0; renderTasbeeh(); saveCounts();" style="margin-right:10px">تصفير</button>
        </div>
      `;
    }

    function toggleDark() {
      document.body.classList.toggle('dark');
    }

    document.getElementById('btnHome').onclick = renderHome;
    document.getElementById('btnMorning').onclick = () => renderAzkar('morning');
    document.getElementById('btnEvening').onclick = () => renderAzkar('evening');
    document.getElementById('btnPrayer').onclick = () => renderAzkar('prayer');
    document.getElementById('btnQuran').onclick = () => renderAzkar('quran');
    document.getElementById('btnTasbeeh').onclick = renderTasbeeh;
    document.getElementById('btnDark').onclick = toggleDark;

    renderHome();
  </script>
</body>
</html>
