<!DOCTYPE html>
<html lang="ar">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>الأذكار</title>

<style>

body{
font-family:Tahoma;
direction:rtl;
margin:0;
background:#f1f3f7;
text-align:center;
}

header{
background:#2f74da;
color:white;
padding:20px;
font-size:24px;
}

.container{
max-width:700px;
margin:auto;
padding:20px;
}

button{

background:#2f74da;
color:white;
border:none;
padding:15px 25px;
margin:10px;
font-size:18px;
border-radius:12px;
cursor:pointer;

}

.card{

background:white;
padding:20px;
margin:15px 0;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);

}

.count{

font-size:24px;
margin:10px;

}

.progress{

background:#ddd;
height:10px;
border-radius:10px;

}

.bar{

height:10px;
background:#2f74da;
width:0%;
border-radius:10px;

}

.dark{

background:#121212;
color:white;

}

.dark .card{

background:#1e1e1e;

}

</style>

</head>

<body>

<header>

📿 الأذكار

<br><br>

<button onclick="home()">الرئيسية</button>

<button onclick="toggleDark()">🌙 الوضع الليلي</button>

</header>

<div class="container" id="app"></div>

<script>

const morning=[

{zekr:"آية الكرسي",max:1},

{zekr:"قل هو الله أحد",max:3},

{zekr:"قل أعوذ برب الفلق",max:3},

{zekr:"قل أعوذ برب الناس",max:3},

{zekr:"بسم الله الذي لا يضر مع اسمه شيء",max:3},

{zekr:"رضيت بالله ربا وبالإسلام دينا وبمحمد ﷺ نبيا",max:3},

{zekr:"سبحان الله وبحمده",max:100}

]

const evening=[

{zekr:"آية الكرسي",max:1},

{zekr:"قل هو الله أحد",max:3},

{zekr:"قل أعوذ برب الفلق",max:3},

{zekr:"قل أعوذ برب الناس",max:3},

{zekr:"بسم الله الذي لا يضر مع اسمه شيء",max:3},

{zekr:"رضيت بالله ربا وبالإسلام دينا وبمحمد ﷺ نبيا",max:3},

{zekr:"سبحان الله وبحمده",max:100}

]

function home(){

document.getElementById("app").innerHTML=

`

<h2>اختر الأذكار</h2>

<button onclick="showAzkar('morning')">🌞 أذكار الصباح</button>

<button onclick="showAzkar('evening')">🌙 أذكار المساء</button>

<br><br>

<button onclick="tasbeeh()">📿 المسبحة الإلكترونية</button>

`

}

function showAzkar(type){

let list=type=="morning"?morning:evening

let html=""

let done=0

list.forEach((item,i)=>{

let saved=localStorage.getItem(type+i) || 0

saved=parseInt(saved)

if(saved>=item.max) done++

let percent=(saved/item.max)*100

html+=`

<div class="card">

<p>${item.zekr}</p>

<div class="count" id="c${i}">${saved} / ${item.max}</div>

<button onclick="inc('${type}',${i},${item.max})">ذكر</button>

<div class="progress">

<div class="bar" id="b${i}" style="width:${percent}%"></div>

</div>

</div>

`

})

let percentDone=Math.round(done/list.length*100)

html=<h3>نسبة الإنجاز ${percentDone}%</h3>+html

document.getElementById("app").innerHTML=html

}

function inc(type,i,max){

let el=document.getElementById("c"+i)

let val=parseInt(el.innerText)

if(val<max){

val++

localStorage.setItem(type+i,val)

el.innerText=val+" / "+max

let percent=(val/max)*100

document.getElementById("b"+i).style.width=percent+"%"

}

}

function tasbeeh(){

let count=localStorage.getItem("tasbeeh")||0

document.getElementById("app").innerHTML=

`

<h2>📿 المسبحة</h2>

<h1 id="tas">${count}</h1>

<button onclick="incTas()">تسبيح</button>

<button onclick="resetTas()">تصفير</button>

`

}

function incTas(){

let c=document.getElementById("tas")

let v=parseInt(c.innerText)

v++

c.innerText=v

localStorage.setItem("tasbeeh",v)

}

function resetTas(){

localStorage.setItem("tasbeeh",0)

tasbeeh()

}

function toggleDark(){

document.body.classList.toggle("dark")

}

home()

</script>

</body>

</html>
